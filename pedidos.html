<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<title>Painel de Pedidos — Grifestor7</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root { --bg:#faf8f3; --surface:#fff; --line:#e9e2d0; --gold:#d4b45a; --gold-dark:#b8973a; --ink:#2b2618; --muted:#8a8272; --ok:#3e9c5c; --warn:#e8853b; --danger:#db6055; }
  body { background: var(--bg); color: var(--ink); font-family: system-ui, -apple-system, sans-serif; min-height: 100vh; }
  .topbar { background: var(--ink); color: var(--gold); padding: 16px 24px; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 10px; }
  .topbar h1 { font-size: 1.05rem; font-weight: 700; letter-spacing: 0.02em; }
  .topbar .info { color: #cfc8b8; font-size: 0.8rem; }
  .wrap { max-width: 1100px; margin: 0 auto; padding: 22px 16px 60px; }

  .gate { max-width: 360px; margin: 90px auto; background: var(--surface); border: 1px solid var(--line); border-radius: 16px; padding: 28px; text-align: center; }
  .gate h2 { font-size: 1.1rem; margin-bottom: 14px; }
  .gate input { width: 100%; padding: 12px 14px; border-radius: 10px; border: 1px solid var(--line); font-size: 0.95rem; margin-bottom: 12px; }
  .gate button { width: 100%; padding: 12px; background: var(--gold); color: #17130a; border: none; border-radius: 10px; font-weight: 700; cursor: pointer; }
  .gate button:hover { background: var(--gold-dark); }
  .gate p.err { color: var(--danger); font-size: 0.82rem; margin-top: 10px; }

  .summary { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 12px; margin-bottom: 20px; }
  .card-sum { background: var(--surface); border: 1px solid var(--line); border-radius: 12px; padding: 14px 16px; }
  .card-sum .n { font-size: 1.5rem; font-weight: 700; }
  .card-sum .l { font-size: 0.75rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.04em; }

  .toolbar { display: flex; gap: 10px; margin-bottom: 16px; flex-wrap: wrap; align-items: center; }
  .toolbar button { padding: 8px 14px; border-radius: 8px; border: 1px solid var(--line); background: var(--surface); cursor: pointer; font-size: 0.82rem; }
  .toolbar button:hover { border-color: var(--gold); }

  table { width: 100%; border-collapse: collapse; background: var(--surface); border-radius: 12px; overflow: hidden; border: 1px solid var(--line); }
  th, td { padding: 12px 14px; text-align: left; font-size: 0.82rem; border-bottom: 1px solid var(--line); vertical-align: top; }
  th { background: #f4efe2; color: var(--muted); text-transform: uppercase; font-size: 0.68rem; letter-spacing: 0.05em; }
  tr:last-child td { border-bottom: none; }
  tr:hover td { background: #fdfbf6; }

  .badge { display: inline-block; padding: 3px 9px; border-radius: 20px; font-size: 0.7rem; font-weight: 700; }
  .b-pago { background: rgba(62,156,92,0.15); color: var(--ok); }
  .b-pendente { background: rgba(232,133,59,0.15); color: var(--warn); }
  .b-vencido { background: rgba(219,96,85,0.15); color: var(--danger); }

  .endereco { max-width: 260px; }
  .copy-btn { background: none; border: none; cursor: pointer; color: var(--gold-dark); font-size: 0.75rem; text-decoration: underline; padding: 0; }

  .empty, .loading { text-align: center; padding: 60px 20px; color: var(--muted); }
  .hidden { display: none !important; }
</style>
</head>
<body>

<div id="gate" class="gate">
  <h2>🔒 Painel de Pedidos</h2>
  <input type="password" id="chave" placeholder="Chave de acesso" autocomplete="off">
  <button onclick="entrar()">Entrar</button>
  <p class="err hidden" id="erroGate">Chave incorreta.</p>
</div>

<div id="painel" class="hidden">
  <div class="topbar">
    <h1>🐾 Grifestor7 — Painel de Pedidos</h1>
    <div class="info" id="atualizadoEm">—</div>
  </div>

  <div class="wrap">
    <div class="summary" id="resumo"></div>

    <div class="toolbar">
      <button onclick="carregar()">🔄 Atualizar</button>
      <button onclick="exportarCSV()">⬇ Exportar CSV</button>
    </div>

    <div id="conteudo" class="loading">Carregando pedidos…</div>
  </div>
</div>

<script>
let CHAVE = '';
let PEDIDOS = [];

function entrar() {
  CHAVE = document.getElementById('chave').value.trim();
  if (!CHAVE) return;
  carregar();
}

function statusInfo(status) {
  if (['RECEIVED', 'CONFIRMED', 'RECEIVED_IN_CASH'].includes(status)) return { label: 'Pago', cls: 'b-pago' };
  if (status === 'OVERDUE') return { label: 'Vencido', cls: 'b-vencido' };
  return { label: 'Pendente', cls: 'b-pendente' };
}

function formatarData(iso) {
  if (!iso) return '—';
  const d = new Date(iso + 'T00:00:00');
  return d.toLocaleDateString('pt-BR');
}

async function carregar() {
  const conteudo = document.getElementById('conteudo');
  const erro = document.getElementById('erroGate');
  conteudo.className = 'loading';
  conteudo.textContent = 'Carregando pedidos…';

  try {
    const resp = await fetch(`/api/pedidos?key=${encodeURIComponent(CHAVE)}`);
    if (resp.status === 401) {
      erro.classList.remove('hidden');
      document.getElementById('gate').classList.remove('hidden');
      document.getElementById('painel').classList.add('hidden');
      return;
    }
    const data = await resp.json();
    if (!data.success) throw new Error(data.error || 'Erro desconhecido');

    erro.classList.add('hidden');
    document.getElementById('gate').classList.add('hidden');
    document.getElementById('painel').classList.remove('hidden');

    PEDIDOS = data.pedidos || [];
    renderResumo();
    renderTabela();
    document.getElementById('atualizadoEm').textContent = 'Atualizado às ' + new Date().toLocaleTimeString('pt-BR');
  } catch (e) {
    conteudo.innerHTML = `<div class="empty">Erro ao carregar pedidos: ${e.message}</div>`;
  }
}

function renderResumo() {
  const pagos = PEDIDOS.filter(p => statusInfo(p.status).label === 'Pago');
  const pendentes = PEDIDOS.filter(p => statusInfo(p.status).label === 'Pendente');
  const totalPago = pagos.reduce((s, p) => s + (p.valor || 0), 0);

  document.getElementById('resumo').innerHTML = `
    <div class="card-sum"><div class="n">${PEDIDOS.length}</div><div class="l">Pedidos (60 últimos)</div></div>
    <div class="card-sum"><div class="n" style="color:var(--ok)">${pagos.length}</div><div class="l">Pagos</div></div>
    <div class="card-sum"><div class="n" style="color:var(--warn)">${pendentes.length}</div><div class="l">Aguardando pagamento</div></div>
    <div class="card-sum"><div class="n">R$ ${totalPago.toFixed(2).replace('.', ',')}</div><div class="l">Faturado (pago)</div></div>
  `;
}

function enderecoCompleto(c) {
  const partes = [c.endereco, c.numero, c.complemento].filter(Boolean).join(', ');
  const cidadeUf = [c.cidade, c.estado].filter(Boolean).join('/');
  return [partes, cidadeUf, c.cep].filter(Boolean).join(' — ');
}

function renderTabela() {
  const conteudo = document.getElementById('conteudo');
  if (!PEDIDOS.length) {
    conteudo.innerHTML = '<div class="empty">Nenhum pedido ainda. Assim que a primeira venda cair, ela aparece aqui.</div>';
    return;
  }

  const linhas = PEDIDOS.map((p, i) => {
    const st = statusInfo(p.status);
    const end = enderecoCompleto(p.cliente);
    return `
      <tr>
        <td>${formatarData(p.criadoEm)}</td>
        <td><span class="badge ${st.cls}">${st.label}</span></td>
        <td>${p.cliente.nome || '—'}<br><span style="color:var(--muted)">${p.cliente.email || ''}</span></td>
        <td>${p.cliente.telefone || '—'}</td>
        <td>${p.descricao || '—'}</td>
        <td>R$ ${(p.valor || 0).toFixed(2).replace('.', ',')}</td>
        <td>${p.forma || '—'}</td>
        <td class="endereco">${end || '—'} ${end ? `<br><button class="copy-btn" onclick="copiar('${end.replace(/'/g, "\\'")}', this)">copiar</button>` : ''}</td>
      </tr>`;
  }).join('');

  conteudo.className = '';
  conteudo.innerHTML = `
    <table>
      <thead><tr>
        <th>Data</th><th>Status</th><th>Cliente</th><th>Telefone</th><th>Produto</th><th>Valor</th><th>Pagamento</th><th>Endereço de entrega</th>
      </tr></thead>
      <tbody>${linhas}</tbody>
    </table>`;
}

function copiar(texto, btn) {
  navigator.clipboard.writeText(texto).then(() => {
    const original = btn.textContent;
    btn.textContent = 'copiado!';
    setTimeout(() => btn.textContent = original, 1500);
  });
}

function exportarCSV() {
  if (!PEDIDOS.length) return;
  const linhas = [['Data', 'Status', 'Cliente', 'Email', 'Telefone', 'CPF', 'Produto', 'Valor', 'Pagamento', 'Endereço', 'Número', 'Complemento', 'Cidade', 'Estado', 'CEP']];
  PEDIDOS.forEach(p => {
    linhas.push([
      formatarData(p.criadoEm), statusInfo(p.status).label, p.cliente.nome, p.cliente.email, p.cliente.telefone,
      p.cliente.cpf, p.descricao, (p.valor || 0).toFixed(2), p.forma,
      p.cliente.endereco, p.cliente.numero, p.cliente.complemento, p.cliente.cidade, p.cliente.estado, p.cliente.cep
    ]);
  });
  const csv = linhas.map(l => l.map(v => `"${String(v || '').replace(/"/g, '""')}"`).join(';')).join('\n');
  const blob = new Blob(['﻿' + csv], { type: 'text/csv;charset=utf-8' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `pedidos-grifestor7-${new Date().toISOString().split('T')[0]}.csv`;
  a.click();
}

document.getElementById('chave').addEventListener('keydown', e => { if (e.key === 'Enter') entrar(); });
</script>
</body>
</html>
